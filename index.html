<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENERATOR PREDIKSI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0a; --surface:#111111; --surface2:#1a1a1a;
    --border:#2a2a2a; --border-bright:#3a3a3a;
    --text:#e8e8e8; --text-muted:#666; --text-dim:#444;
    --accent:#00ff88; --accent-dim:rgba(0,255,136,0.10);
    --gold:#f0b429; --gold-dim:rgba(240,180,41,0.10);
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:var(--sans); background:var(--bg); color:var(--text); min-height:100vh; line-height:1.5; }
  body::before {
    content:''; position:fixed; inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);
    pointer-events:none; z-index:9999;
  }
  header {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:0 28px; height:54px; display:flex; align-items:center;
    justify-content:space-between; position:sticky; top:0; z-index:100;
  }
  .logo { font-family:var(--mono); font-weight:700; font-size:13px; letter-spacing:0.18em; color:var(--accent); text-transform:uppercase; }
  .header-right { display:flex; align-items:center; gap:14px; }
  .status-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 6px rgba(0,255,136,0.4); animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.35;} }
  .ver-badge { font-family:var(--mono); font-size:9px; font-weight:700; letter-spacing:0.15em; color:var(--text-dim); border:1px solid var(--border-bright); padding:3px 8px; }
  .wrap { max-width:960px; margin:0 auto; padding:24px 20px; display:flex; flex-direction:column; gap:14px; }
  .panel { background:var(--surface); border:1px solid var(--border); }
  .panel-header { padding:9px 16px; background:var(--surface2); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .panel-label { font-family:var(--mono); font-size:9px; font-weight:700; letter-spacing:0.22em; color:var(--text-muted); text-transform:uppercase; }
  .panel-label.gold { color:var(--gold); }
  .panel-body { padding:14px 16px; }
  .selector-grid { display:flex; flex-wrap:wrap; gap:7px; align-items:center; }
  select, input[type="text"] {
    background:var(--bg); border:1px solid var(--border); color:var(--text);
    font-family:var(--mono); font-size:11px; padding:7px 10px; outline:none;
    -webkit-appearance:none; transition:border-color 0.15s; cursor:pointer; height:34px;
  }
  select:focus, input[type="text"]:focus { border-color:var(--accent); }
  input[type="text"]::placeholder { color:var(--text-dim); }
  .input-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .input-main { font-family:var(--mono); font-size:20px; font-weight:700; width:110px; letter-spacing:0.2em; height:44px; padding:0 12px; text-align:center; }
  .btn { font-family:var(--mono); font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; border:1px solid var(--border); background:var(--surface2); color:var(--text-muted); padding:0 16px; cursor:pointer; transition:all 0.12s; height:34px; display:inline-flex; align-items:center; white-space:nowrap; }
  .btn:hover { border-color:var(--border-bright); color:var(--text); }
  .btn-accent { background:var(--accent); border-color:var(--accent); color:#000; height:44px; padding:0 22px; font-size:11px; }
  .btn-accent:hover { background:#00cc6a; border-color:#00cc6a; }
  .btn-accent:disabled { opacity:0.5; cursor:not-allowed; }
  .btn-ghost { background:transparent; }
  .btn-gold { background:var(--gold); border-color:var(--gold); color:#000; }
  .btn-gold:hover { background:#d4a017; border-color:#d4a017; color:#000; }

  .output-box {
    background:var(--bg); border:1px solid var(--border); font-family:var(--mono);
    font-size:11.5px; line-height:2; padding:18px; min-height:220px;
    color:var(--text); white-space:pre-wrap; letter-spacing:0.03em;
  }

  .output-actions { display:flex; gap:8px; padding:10px 16px; border-top:1px solid var(--border); background:var(--surface2); }

  #toast { position:fixed; bottom:24px; right:24px; background:var(--accent); color:#000; font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:0.1em; padding:10px 20px; text-transform:uppercase; transform:translateY(80px); opacity:0; transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1); z-index:9999; pointer-events:none; }
  #toast.show { transform:translateY(0); opacity:1; }
  ::-webkit-scrollbar { width:4px; height:4px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border-bright); }
</style>
</head>
<body>

<header>
  <div class="logo">Generator Prediksi</div>
  <div class="header-right">
    <div class="status-dot"></div>
    <div class="ver-badge">v19.0</div>
  </div>
</header>

<div class="wrap">

  <!-- CONFIG -->
  <div class="panel">
    <div class="panel-header"><div class="panel-label">Konfigurasi Prediksi</div></div>
    <div class="panel-body">
      <div class="selector-grid">
        <select id="prediksiName" style="width:170px;">
          <option>CAMBODIA</option><option>BULLSEYE</option><option>SYDNEY</option>
          <option>CHINA</option><option>JEPANG</option><option>SINGAPORE</option>
          <option>MONGOLIA</option><option>PCSO</option><option>TAIWAN</option>
          <option>HONGKONG</option><option>TOTO MACAU P1</option><option>TOTO MACAU P2</option>
          <option>TOTO MACAU P3</option><option>TOTO MACAU P4</option><option>TOTO MACAU P5</option>
          <option selected>TOTO MACAU P6</option><option>KINGKONG P1</option><option>KINGKONG P2</option>
        </select>
        <select id="dayName" style="width:90px;">
          <option>MINGGU</option><option>SENIN</option><option>SELASA</option>
          <option>RABU</option><option>KAMIS</option><option selected>JUMAT</option><option>SABTU</option>
        </select>
        <select id="day" style="width:58px;"></select>
        <select id="month" style="width:105px;">
          <option value="Januari">JANUARI</option><option value="Februari">FEBRUARI</option>
          <option value="Maret">MARET</option><option value="April">APRIL</option>
          <option value="Mei">MEI</option><option value="Juni">JUNI</option>
          <option value="Juli">JULI</option><option value="Agustus">AGUSTUS</option>
          <option value="September">SEPTEMBER</option><option value="Oktober" selected>OKTOBER</option>
          <option value="November">NOVEMBER</option><option value="Desember">DESEMBER</option>
        </select>
        <input type="text" id="year" value="2026" style="width:62px;">
      </div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="panel">
    <div class="panel-header"><div class="panel-label">Masukkan Result Kemarin</div></div>
    <div class="panel-body">
      <div class="input-row">
        <input type="text" id="mainInput" class="input-main" placeholder="6143" maxlength="4">
        <button class="btn btn-accent" id="btnGenerate" onclick="doGenerate()">Generate</button>
        <button class="btn btn-ghost" onclick="doClear()">Clear</button>
      </div>
    </div>
  </div>

  <!-- OUTPUT MODE SELECTOR -->
  <div class="panel">
    <div class="panel-header"><div class="panel-label">Mode Output</div></div>
    <div class="panel-body">
      <div class="selector-grid">
        <select id="outputMode" style="width:180px;" onchange="onModeChange()">
          <option value="webkecil">⬡ Web Kecil</option>
          <option value="koitoto">◆ Koitoto</option>
        </select>
      </div>
    </div>
  </div>

  <!-- SINGLE OUTPUT PANEL -->
  <div class="panel" id="outputPanel">
    <div class="panel-header">
      <div class="panel-label" id="outputPanelLabel">⬡ Web Kecil</div>
    </div>
    <div class="output-box" id="outputBox">Belum ada data.</div>
    <div class="output-actions">
      <button class="btn btn-accent" id="btnCopy" style="height:34px;padding:0 14px;font-size:10px;" onclick="doCopy('outputBox')">Copy</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ============================================================
// SHIO
// ============================================================
const SHIO = {
  KUDA:    ["01","13","25","37","49","61","73","85","97"],
  ULAR:    ["02","14","26","38","50","62","74","86","98"],
  NAGA:    ["03","15","27","39","51","63","75","87","99"],
  KELINCI: ["04","16","28","40","52","64","76","88","00"],
  HARIMAU: ["05","17","29","41","53","65","77","89"],
  KERBAU:  ["06","18","30","42","54","66","78","90"],
  TIKUS:   ["07","19","31","43","55","67","79","91"],
  BABI:    ["08","20","32","44","56","68","80","92"],
  ANJING:  ["09","21","33","45","57","69","81","93"],
  AYAM:    ["10","22","34","46","58","70","82","94"],
  MONYET:  ["11","23","35","47","59","71","83","95"],
  KAMBING: ["12","24","36","48","60","72","84","96"]
};
function toShio(pair) {
  const p = String(pair).padStart(2,"0");
  for (const [k,v] of Object.entries(SHIO)) if (v.includes(p)) return k;
  return "?";
}

// ============================================================
// HELPERS
// ============================================================
function shuffle(a) {
  const arr = [...a];
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function hasAscPair(s) {
  for (let i = 0; i < s.length-1; i++)
    if (parseInt(s[i+1]) === parseInt(s[i])+1) return true;
  return false;
}

function gapOK(prev, next) {
  for (let p = 0; p < prev.length; p++) {
    const d = prev[p];
    for (let np = 0; np < next.length; np++) {
      if (next[np] === d && Math.abs(np-p) <= 1) return false;
    }
  }
  return true;
}

function junctionAscOK(prev, next) {
  return parseInt(next[0]) !== parseInt(prev[prev.length-1])+1;
}

function extractPairs(s) {
  const pairs = [];
  for (let i = 0; i < s.length-1; i++) pairs.push(s[i]+s[i+1]);
  return pairs;
}

function registerPairs(s, set) { extractPairs(s).forEach(p => set.add(p)); }
function unregisterPairs(s, set) { extractPairs(s).forEach(p => set.delete(p)); }

function newPairsConflict(c, usedPairs) {
  return extractPairs(c).some(p => usedPairs.has(p));
}

function canAppend(prev, c, usedPairs) {
  if (prev) {
    if (!gapOK(prev, c)) return false;
    if (!junctionAscOK(prev, c)) return false;
  }
  if (newPairsConflict(c, usedPairs)) return false;
  return true;
}

function isValidNum(s) {
  if (new Set(s).size !== s.length) return false;
  if (hasAscPair(s)) return false;
  return true;
}

function genAllValid(pool, len) {
  const results = [];
  function perm(cur, rem) {
    if (cur.length === len) {
      const s = cur.join('');
      if (isValidNum(s)) results.push(s);
      return;
    }
    for (const d of rem) {
      if (cur.length > 0 && parseInt(d) === parseInt(cur[cur.length-1])+1) continue;
      perm([...cur, d], rem.filter(x => x !== d));
    }
  }
  perm([], pool);
  return shuffle(results);
}

function buildList(candidates, count) {
  const result = [];
  const usedNums = new Set();
  const usedPairs = new Set();

  function bt() {
    if (result.length === count) return true;
    const prev = result.length > 0 ? result[result.length-1] : null;
    for (const c of candidates) {
      if (usedNums.has(c)) continue;
      if (!canAppend(prev, c, usedPairs)) continue;
      result.push(c); usedNums.add(c); registerPairs(c, usedPairs);
      if (bt()) return true;
      result.pop(); usedNums.delete(c); unregisterPairs(c, usedPairs);
    }
    return false;
  }

  for (let attempt = 0; attempt < 30; attempt++) {
    result.length = 0; usedNums.clear(); usedPairs.clear();
    shuffle(candidates);
    if (bt()) return result;
  }
  return result;
}

function build2DGrid(candidates) {
  for (let attempt = 0; attempt < 60; attempt++) {
    const pool = shuffle([...candidates]);
    const usedNums = new Set();
    const usedPairs = new Set();

    const row1 = [];
    function fillRow1() {
      if (row1.length === 6) return true;
      const prev = row1.length > 0 ? row1[row1.length-1] : null;
      for (const c of pool) {
        if (usedNums.has(c)) continue;
        if (!canAppend(prev, c, usedPairs)) continue;
        row1.push(c); usedNums.add(c); registerPairs(c, usedPairs);
        if (fillRow1()) return true;
        row1.pop(); usedNums.delete(c); unregisterPairs(c, usedPairs);
      }
      return false;
    }
    if (!fillRow1()) continue;

    const row2 = [];
    function fillRow2() {
      if (row2.length === 6) return true;
      const col = row2.length;
      const prev = row2.length > 0 ? row2[row2.length-1] : null;
      for (const c of pool) {
        if (usedNums.has(c)) continue;
        if (!canAppend(prev, c, usedPairs)) continue;
        let vertOK = true;
        for (let dc = -1; dc <= 1; dc++) {
          const rc = col+dc;
          if (rc >= 0 && rc < 6) {
            if (!gapOK(row1[rc], c)) { vertOK = false; break; }
            if (dc === 0 && !junctionAscOK(row1[rc], c)) { vertOK = false; break; }
          }
        }
        if (!vertOK) continue;
        row2.push(c); usedNums.add(c); registerPairs(c, usedPairs);
        if (fillRow2()) return true;
        row2.pop(); usedNums.delete(c); unregisterPairs(c, usedPairs);
      }
      return false;
    }
    if (fillRow2()) return [...row1, ...row2];
  }
  return shuffle([...candidates]).slice(0, 12);
}

// ============================================================
// SHUFFLE NO ASC PAIR (for BBFS display)
// ============================================================
function shuffleNoAsc(arr) {
  let result = shuffle([...arr]);
  for (let t = 0; t < 10000; t++) {
    if (!hasAscPair(result.join(''))) break;
    result = shuffle([...arr]);
  }
  return result;
}

// ============================================================
// KOITOTO NAME MAPPING
// ============================================================
const KOITOTO_NAME = {
  "CAMBODIA": "CAMBODIA", "BULLSEYE": "BULLSEYE", "SYDNEY": "SYDNEY",
  "CHINA": "CHINA", "JEPANG": "JEPANG", "SINGAPORE": "SINGAPORE",
  "MONGOLIA": "MONGOLIA", "PCSO": "PCSO", "TAIWAN": "TAIWAN",
  "HONGKONG": "HONGKONG",
  "TOTO MACAU P1": "MACAU P1", "TOTO MACAU P2": "MACAU P2",
  "TOTO MACAU P3": "MACAU P3", "TOTO MACAU P4": "MACAU P4",
  "TOTO MACAU P5": "MACAU P5", "TOTO MACAU P6": "MACAU P6",
  "KINGKONG P1": "KINGKONG P1", "KINGKONG P2": "KINGKONG P2"
};

// ============================================================
// MAIN BUILD
// ============================================================
function build(mainInput) {
  if (!/^\d{4}$/.test(mainInput)) return { error: "Input harus 4 digit angka." };
  const bannedSet = new Set(mainInput.split(''));
  const remaining = [...'0123456789'].filter(d => !bannedSet.has(d));
  if (remaining.length < 6) return { error: "Digit tersisa kurang dari 6." };
  const pool = shuffle(remaining).slice(0, 6);

  const cands4D = genAllValid(pool, 4);
  const cands3D = genAllValid(pool, 3);
  const cands2D = genAllValid(pool, 2);

  // WEB KECIL: 4 × 4D, 6 × 3D, 12 × 2D
  const fourD  = buildList(cands4D, 4);
  const threeD = buildList(cands3D, 6);
  const twoD   = build2DGrid(cands2D);
  const twoD1  = twoD.slice(0, 6);
  const twoD2  = twoD.slice(6, 12);

  // KOITOTO: 6 × 4D, 7 × 3D, 9 × 2D (re-generate fresh candidates)
  const fourD_k  = buildList(genAllValid(pool, 4), 6);
  const threeD_k = buildList(genAllValid(pool, 3), 7);
  const twoD_k   = buildList(genAllValid(pool, 2), 9);

  // BBFS: 6 digits no asc
  const bbfsDigits = shuffleNoAsc([...pool]);
  const bbfs = `✹ ${bbfsDigits.join(' ')} ✹`;

  // ANGKA MAIN KOITOTO: 5 digits — no asc pair as full string
  let angkaMain5 = shuffle([...pool]).slice(0, 5);
  for (let t = 0; t < 10000; t++) {
    if (!hasAscPair(angkaMain5.join(''))) break;
    angkaMain5 = shuffle([...pool]).slice(0, 5);
  }

  // COLOK BEBAS: 2 single digits from pool, different, no asc between them
  let cb1 = angkaMain5[4], cb2 = angkaMain5[3];
  if (parseInt(cb2) === parseInt(cb1) + 1) { cb1 = angkaMain5[3]; cb2 = angkaMain5[4]; }
  const colokBebas = `${cb1} / ${cb2}`;

  // COLOK 2D: 2 pairs, no asc within each pair, cross-rule if shared digit
  // Use pos[0]+pos[3] and pos[1]+pos[2] from angkaMain5
  let p1a = angkaMain5[0], p1b = angkaMain5[3];
  let p2a = angkaMain5[1], p2b = angkaMain5[2];
  // fix asc within each pair
  if (parseInt(p1b) === parseInt(p1a) + 1) [p1a, p1b] = [p1b, p1a];
  if (parseInt(p2b) === parseInt(p2a) + 1) [p2a, p2b] = [p2b, p2a];
  const colok2D = `${p1a}${p1b} / ${p2a}${p2b}`;

  // CB, TWIN (Web Kecil)
  const cb2_pairs = [
    bbfsDigits[0]+bbfsDigits[1],
    bbfsDigits[2]+bbfsDigits[3],
    bbfsDigits[4]+bbfsDigits[5],
  ];
  const cb   = cb2_pairs.map(p => p[0]);
  const twin = cb.map(c => c+c);

  // SHIO
  const sh1 = toShio(bbfsDigits[0]+bbfsDigits[1]);
  const sh2 = toShio(bbfsDigits[3]+bbfsDigits[4]);
  const shioJitu = toShio(angkaMain5[0]+angkaMain5[1]);

  // GET UI values
  const G = id => document.getElementById(id).value;
  const predName = G('prediksiName');
  const dayName  = G('dayName');
  const day      = G('day');
  const month    = G('month');      // e.g. "Oktober"
  const monthUP  = month.toUpperCase(); // e.g. "OKTOBER"
  const year     = G('year');

  // ---- WEB KECIL FORMAT ----
  let outWK = `PREDIKSI TOGEL ${predName} ${dayName} ${day} ${monthUP} ${year}\n\n`;
  outWK += `BBFS   : ${bbfs}\n\n`;
  outWK += `4D     : ✹ ${fourD.join(' - ')} ✹\n\n`;
  outWK += `3D     : ✹ ${threeD.join(' - ')} ✹\n\n`;
  outWK += `⇓ ANGKA TOP 2D 12 LINE (BB) ⇓\n\n`;
  outWK += `✪ ${twoD1.join(' - ')} ✪\n\n`;
  outWK += `✪ ${twoD2.join(' - ')} ✪\n\n`;
  outWK += `CB 2D  : ✪ ${cb2_pairs.join(' - ')} ✪\n\n`;
  outWK += `CB     : ✹ ${cb.join(' - ')} ✹\n\n`;
  outWK += `TWIN   : ✪ ${twin.join(' - ')} ✪\n\n`;
  outWK += `Shio   : ✪ ${sh1} - ${sh2} ✪\n\n`;
  outWK += `Selalu Utamakan Prediksi Sendiri (UPS)`;

  // ---- KOITOTO FORMAT ----
  const kName = KOITOTO_NAME[predName] || predName;
  let outKT = `PREDIKSI ${kName} KOITOTO ${day} ${monthUP} ${year}\n\n`;
  outKT += `ANGKA MAIN  : ✹ ${angkaMain5.join('')} ✹\n\n`;
  outKT += `TOP 4D (BB) : ✹ ${fourD_k.join(' - ')} ✹\n`;
  outKT += `TOP 3D (BB) : ✹ ${threeD_k.join(' - ')} ✹\n`;
  outKT += `TOP 2D (BB) : ✹ ${twoD_k.join(' - ')} ✹\n\n`;
  outKT += `COLOK BEBAS : ✹ ${colokBebas} ✹\n`;
  outKT += `COLOK 2D    : ✹ ${colok2D} ✹\n\n`;
  outKT += `SHIO JITU   : ${shioJitu}\n\n`;
  outKT += `Tetap Utamakan Prediksi Sendiri (UPS)`;

  return { outWK, outKT };
}

// ============================================================
// UI
// ============================================================
let lastResult = null;

function onModeChange() {
  if (!lastResult) return;
  applyOutput(lastResult);
}

function applyOutput(result) {
  const mode = document.getElementById("outputMode").value;
  const isKoitoto = mode === "koitoto";
  document.getElementById("outputBox").textContent = isKoitoto ? result.outKT : result.outWK;
  document.getElementById("outputPanelLabel").textContent = isKoitoto ? "◆ Koitoto" : "⬡ Web Kecil";
  document.getElementById("btnCopy").className = isKoitoto
    ? "btn btn-gold" : "btn btn-accent";
  document.getElementById("btnCopy").style.cssText = "height:34px;padding:0 14px;font-size:10px;";
}

function doGenerate() {
  const v = document.getElementById("mainInput").value.trim();
  const btn = document.getElementById("btnGenerate");
  btn.disabled = true;
  btn.textContent = "Loading...";
  setTimeout(() => {
    const result = build(v);
    btn.disabled = false;
    btn.textContent = "Generate";
    if (result.error) { showToast(result.error); return; }
    lastResult = result;
    applyOutput(result);
  }, 20);
}

function doClear() {
  document.getElementById("mainInput").value = "";
  document.getElementById("outputBox").textContent = "Belum ada data.";
  lastResult = null;
}

function doCopy(id) {
  const text = document.getElementById(id).textContent;
  if (!text || text === "Belum ada data.") return;
  navigator.clipboard.writeText(text).then(() => showToast("Disalin!"));
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

document.addEventListener('DOMContentLoaded', () => {
  const ds = document.getElementById('day');
  const today = new Date().getDate().toString().padStart(2,'0');
  for (let i = 1; i <= 31; i++) {
    const val = i.toString().padStart(2,'0');
    const opt = document.createElement('option');
    opt.value = val; opt.textContent = val;
    if (val === today) opt.selected = true;
    ds.appendChild(opt);
  }
  // Set current month
  const monthMap = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
  const monthSel = document.getElementById('month');
  const curMonth = monthMap[new Date().getMonth()];
  for (const opt of monthSel.options) {
    if (opt.value === curMonth) { opt.selected = true; break; }
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.id === 'mainInput') doGenerate();
});
</script>
</body>
</html>
